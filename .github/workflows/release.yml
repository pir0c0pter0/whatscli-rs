name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v1.0.12"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

jobs:
  build-native:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runs_on: ubuntu-latest
            binary: whatscli
          - name: windows
            runs_on: windows-latest
            binary: whatscli.exe

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          cargo build --release --locked
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-asset
          path: dist/${{ matrix.binary }}

  build-raspberrypi:
    name: Build raspberrypi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross toolchain
        run: cargo install cross --locked

      - name: Build binary
        run: |
          mkdir -p dist
          cross build --release --locked --target arm-unknown-linux-gnueabihf
          cp target/arm-unknown-linux-gnueabihf/release/whatscli dist/whatscli

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: raspberrypi-asset
          path: dist/whatscli

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-native
      - build-raspberrypi

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Package assets
        run: |
          mkdir -p release-assets
          cp dist/linux-asset/whatscli release-assets/
          chmod +x release-assets/whatscli
          cp release-assets/whatscli "release-assets/whatscli-${RELEASE_VERSION}-linux-x64"
          (
            cd release-assets
            zip "whatscli-${RELEASE_VERSION}-linux.zip" whatscli
            rm whatscli
          )

          cp dist/windows-asset/whatscli.exe release-assets/
          cp release-assets/whatscli.exe "release-assets/whatscli-${RELEASE_VERSION}-windows-x64.exe"
          (
            cd release-assets
            zip "whatscli-${RELEASE_VERSION}-windows.zip" whatscli.exe
            rm whatscli.exe
          )

          cp dist/raspberrypi-asset/whatscli release-assets/whatscli
          chmod +x release-assets/whatscli
          cp release-assets/whatscli "release-assets/whatscli-${RELEASE_VERSION}-linux-armv7"
          (
            cd release-assets
            zip "whatscli-${RELEASE_VERSION}-raspberrypi.zip" whatscli
            rm whatscli
          )

          ls -lah release-assets

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          current_tag="$version"
          previous_tag="$(git tag --sort=-v:refname | grep -vx "$current_tag" | head -n1)"
          if [ -n "$previous_tag" ]; then
            git log "$previous_tag..HEAD" --no-decorate --pretty=format:'- %s' --abbrev-commit > changes.txt
          else
            git log --no-decorate --pretty=format:'- %s' --abbrev-commit > changes.txt
          fi
          if [ ! -s changes.txt ]; then
            echo "- Release $version" > changes.txt
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          body_path: changes.txt
          files: release-assets/*
          draft: false
          prerelease: false

  update-homebrew-tap:
    name: Update homebrew tap
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v5
        with:
          repository: normen/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          version="${{ needs.release.outputs.version }}"
          url="https://github.com/normen/whatscli/archive/${version}.tar.gz"
          curl -fsSL "$url" -o "${version}.tar.gz"
          shasum="$(sha256sum "${version}.tar.gz" | awk '{print $1}')"
          rm "${version}.tar.gz"

          cd homebrew-tap
          cat > Formula/whatscli.rb <<EOF
          class Whatscli < Formula
            desc "Native terminal client for WhatsApp"
            homepage "https://github.com/normen/whatscli"
            url "$url"
            sha256 "$shasum"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match "WhatsCLI", shell_output("#{bin}/whatscli --help")
            end
          end
          EOF

      - name: Commit and push
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/whatscli.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "update whatscli to ${{ needs.release.outputs.version }}"
          git push

  publish-aur-whatscli:
    name: Publish AUR whatscli
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Generate AUR packaging files
        run: bash ./.github/scripts/generate-aur-pkgbuilds.sh "${{ needs.release.outputs.version }}"

      - name: Publish whatscli to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: whatscli
          pkgbuild: ./.github/aur/whatscli/PKGBUILD
          assets: |
            ./.github/aur/whatscli/.SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update whatscli to ${{ needs.release.outputs.version }}"

  publish-aur-whatscli-git:
    name: Publish AUR whatscli-git
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Generate AUR packaging files
        run: bash ./.github/scripts/generate-aur-pkgbuilds.sh "${{ needs.release.outputs.version }}"

      - name: Publish whatscli-git to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: whatscli-git
          pkgbuild: ./.github/aur/whatscli-git/PKGBUILD
          assets: |
            ./.github/aur/whatscli-git/.SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update whatscli-git packaging"
