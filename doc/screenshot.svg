  <rect x="326" y="159" width="38" height="25" rx="4" fill="#00A884"/>
  <text x="337" y="178" fill="#0B141A" font-family="Noto Sans Mono, monospace" font-size="15" font-weight="700">2</text>
  <text x="50" y="215" fill="#8696A0" font-family="Noto Sans Mono, monospace" font-size="15">Você viu as fotos da viagem?</text>
