<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">WhatsCLI modern terminal interface</title>
  <desc id="desc">Dark WhatsApp-inspired terminal interface with conversations, directional message bubbles, composer and command hints.</desc>
  <rect width="1440" height="900" rx="18" fill="#071016"/>
